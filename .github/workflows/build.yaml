name: build

on:
  push:
    tags:
      - 'v*'
env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: windows
            os: Windows-2022
            arch: amd64
          - platform: linux
            os: ubuntu-22.04
            arch: amd64
          - platform: macos
            os: macos-15-intel
            arch: amd64
          - platform: macos
            os: macos-latest
            arch: arm64
          #          - platform: windows
          #            os: windows-11-arm
          #            arch: arm64
          - platform: linux
            os: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Setup rust
        if: startsWith(matrix.os, 'windows-11-arm')
        run: |
          Invoke-WebRequest -Uri "https://win.rustup.rs/aarch64" -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-toolchain stable
          $cargoPath = "$env:USERPROFILE\.cargo\bin"
          Add-Content $env:GITHUB_PATH $cargoPath

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android Signing
        if: startsWith(matrix.platform,'android')
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          echo "${{ secrets.SERVICE_JSON }}" | base64 --decode > android/app/google-services.json
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum

      - name: Build libzt for Android
        if: startsWith(matrix.platform, 'android')
        run: |
          # Install CMake and Ninja
          sudo apt-get update && sudo apt-get install -y cmake ninja-build

          # Set ANDROID_NDK from the pre-installed NDK in the runner
          export ANDROID_NDK=$ANDROID_NDK_HOME
          if [ -z "$ANDROID_NDK" ]; then
            export ANDROID_NDK=$ANDROID_NDK_LATEST_HOME
          fi
          echo "Using ANDROID_NDK=$ANDROID_NDK"

          # Clone libzt source
          LIBZT_DIR="core/zerotier/libzt"
          if [ ! -d "$LIBZT_DIR" ] || [ -z "$(ls -A "$LIBZT_DIR" 2>/dev/null)" ]; then
            git clone --recurse-submodules --depth 1 https://github.com/zerotier/libzt.git "$LIBZT_DIR"
          fi

          # Build for each Android architecture
          for ARCH_ABI in arm64-v8a armeabi-v7a x86_64; do
            echo "=== Building libzt for $ARCH_ABI ==="
            BUILD_DIR="$LIBZT_DIR/build/$ARCH_ABI"
            OUTPUT_DIR="$LIBZT_DIR/lib/$ARCH_ABI"
            mkdir -p "$BUILD_DIR" "$OUTPUT_DIR"

            cmake -S "$LIBZT_DIR" -B "$BUILD_DIR" \
              -G Ninja \
              -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI="$ARCH_ABI" \
              -DANDROID_PLATFORM=android-21 \
              -DBUILD_SHARED_LIBS=OFF \
              -DCMAKE_BUILD_TYPE=Release \
              -DZTS_ENABLE_JAVA=OFF \
              -DZTS_ENABLE_PYTHON=OFF

            cmake --build "$BUILD_DIR" --config Release -- -j$(nproc)

            # Copy static libraries - libzt produces libzt_pic.a plus dependencies
            # We need to merge all static libs into a single libzt.a for CGO linking
            ALL_LIBS=$(find "$BUILD_DIR/lib" -name "*.a" -type f | sort)
            if [ -z "$ALL_LIBS" ]; then
              echo "Error: no .a files found for $ARCH_ABI"
              find "$BUILD_DIR" -name "*.a" -type f
              exit 1
            fi
            echo "Found static libraries:"
            echo "$ALL_LIBS"

            # Use ar to merge all static libraries into one
            TOOLCHAIN_PREFIX=""
            case "$ARCH_ABI" in
              arm64-v8a) TOOLCHAIN_PREFIX="aarch64-linux-android" ;;
              armeabi-v7a) TOOLCHAIN_PREFIX="arm-linux-androideabi" ;;
              x86_64) TOOLCHAIN_PREFIX="x86_64-linux-android" ;;
            esac
            AR=$(find "$ANDROID_NDK/toolchains/llvm/prebuilt" -name "llvm-ar" | head -1)

            # Create MRI script to merge all .a files
            MRI_SCRIPT="$BUILD_DIR/merge.mri"
            echo "CREATE $OUTPUT_DIR/libzt.a" > "$MRI_SCRIPT"
            for lib in $ALL_LIBS; do
              echo "ADDLIB $lib" >> "$MRI_SCRIPT"
            done
            echo "SAVE" >> "$MRI_SCRIPT"
            echo "END" >> "$MRI_SCRIPT"

            $AR -M < "$MRI_SCRIPT"
            echo "Merged into $OUTPUT_DIR/libzt.a"
          done

          # Copy headers
          INCLUDE_DIR="$LIBZT_DIR/include"
          mkdir -p "$INCLUDE_DIR"
          find "$LIBZT_DIR" -maxdepth 4 -name "ZeroTierSockets.h" -exec cp {} "$INCLUDE_DIR/" \;
          echo "Headers copied to $INCLUDE_DIR/"
          ls -la "$INCLUDE_DIR/"

      - name: Setup Flutter
        if: ${{ !(startsWith(matrix.os, 'windows-11-arm') || startsWith(matrix.os, 'ubuntu-24.04-arm')) }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true
      - name: Setup Flutter With Other
        if: startsWith(matrix.os, 'windows-11-arm') || startsWith(matrix.os, 'ubuntu-24.04-arm')
        uses: subosito/flutter-action@v2
        with:
          channel: master
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter pub get

      - name: Setup
        run: dart setup.dart ${{ matrix.platform }} ${{ matrix.arch && format('--arch {0}', matrix.arch) }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist
          overwrite: true

  changelog:
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        if: ${{ env.IS_STABLE == 'true' }}
        with:
          fetch-depth: 0
          ref: refs/heads/main
      - name: Generate
        if: ${{ env.IS_STABLE == 'true' }}
        run: |
          last_ver=$(grep -m1 '^## ' CHANGELOG.md 2>/dev/null | sed 's/^## //')

          tags=($(git tag --merged HEAD --sort=-creatordate))

          temp="NEW_CHANGELOG.md" > "$temp"

          for i in "${!tags[@]}"; do
              curr="${tags[i]}"
              [[ "$curr" == "$last_ver" ]] && break

              prev="${tags[i+1]}"
              range="${prev:+$prev..}$curr"

              echo -e "## $curr\n" >> "$temp"
              git log --no-merges --pretty=format:"%B" "$range" | \
              awk '!/Update changelog/ && NF {print "- " $0 "\n"}' >> "$temp"
          done
          [ -f CHANGELOG.md ] && cat CHANGELOG.md >> "$temp"

          mv "$temp" CHANGELOG.md

      - name: Commit
        if: ${{ env.IS_STABLE == 'true' }}
        run: |
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            echo "Commit pushing"
            git config --local user.email "chen08209@gmail.com"
            git config --local user.name "chen08209"
            git commit -m "Update changelog"
            git push
            if [ $? -eq 0 ]; then
              echo "Push succeeded"
            else
              echo "Push failed"
              exit 1
            fi
          fi

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload:
    permissions: write-all
    needs: [ build ]
    runs-on: ubuntu-latest
    # services:
    #   telegram-bot-api:
    #     image: aiogram/telegram-bot-api:latest
    #     env:
    #       TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
    #       TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
    #     ports:
    #       - 8081:8081
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          tags=($(git tag --merged HEAD --sort=-creatordate))
          preTag=$(curl -s "https://api.github.com/repos/chen08209/FlClash/releases/latest" | \
          sed -nE 's/.*"tag_name": "([^"]+)".*/\1/p')

          [ -z "$preTag" ] && preTag=""

          out="release.md" > "$out"

          for i in "${!tags[@]}"; do
            curr="${tags[i]}"
            [[ "$curr" == "$preTag" ]] && break

            prev="${tags[i+1]}"
            range="${prev:+$prev..}$curr"

            git log --no-merges --pretty=format:"%B" "$range" | \
            awk '!/Update changelog/ && NF {print "- " $0 "\n"}' >> "$out"
          done

      # - name: Push to telegram
      #   env:
      #     TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      #     TAG: ${{ github.ref_name }}
      #     RUN_ID: ${{ github.run_id }}
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install requests
      #     python release_telegram.py

      - name: Patch release.md
        run: |
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          sed "s|VERSION|$version|g" ./.github/release_template.md >> release.md

      - name: Generate sha256
        if: env.IS_STABLE == 'true'
        run: |
          cd ./dist
          for file in $(find . -type f -not -name "*.sha256"); do
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Release
        if: ${{ env.IS_STABLE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          body_path: './release.md'

